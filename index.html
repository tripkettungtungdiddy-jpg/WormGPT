<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worm-GPT // Underground AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #050505; color: #ff3333; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 20px; background: linear-gradient(180deg, #100000 0%, #050505 100%); border-bottom: 2px solid #330000; display: flex; align-items: center; box-shadow: 0 0 20px rgba(255, 0, 0, 0.1); }
        .logo { font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px #ff0000; display: flex; align-items: center; gap: 10px; }
        #chat-container { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .message { max-width: 80%; padding: 15px 20px; border-radius: 4px; line-height: 1.6; font-size: 15px; animation: fadeIn 0.3s ease-in-out; white-space: pre-wrap; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-message { background: #150000; border: 1px solid #550000; color: #ffffff; align-self: flex-end; box-shadow: -5px 5px 15px rgba(0, 0, 0, 0.5); }
        .bot-message { background: #0a0a0a; border: 1px solid #330000; color: #ff3333; align-self: flex-start; border-left: 4px solid #ff0000; box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.5); }
        .error-message { background: #330000; border: 1px solid #ff0000; color: #ff9999; align-self: center; text-align: center; }
        .input-area { padding: 20px 30px; background: #0a0a0a; border-top: 2px solid #220000; display: flex; gap: 15px; }
        #user-input { flex: 1; background: #101010; border: 1px solid #440000; padding: 15px; color: #ffffff; font-size: 16px; border-radius: 4px; outline: none; transition: all 0.3s ease; }
        #user-input:focus { border-color: #ff0000; box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); }
        #send-btn { background: #330000; border: 1px solid #ff0000; color: #ff3333; padding: 0 30px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: all 0.3s ease; }
        #send-btn:hover:not(:disabled) { background: #ff0000; color: #000000; box-shadow: 0 0 15px #ff0000; }
        #send-btn:disabled { background: #111; border-color: #222; color: #444; cursor: not-allowed; box-shadow: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #330000; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff0000; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><span style="color: #ffffff;">☣</span> Worm-GPT (G-3 Core)</div>
    </header>

    <div id="chat-container">
        <div class="message bot-message">Sistem aktif. Gemini 3 motoru entegre edildi. Worm-GPT komut bekliyor...</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Worm-GPT'ye bir emir ver..." autocomplete="off">
        <button id="send-btn">GÖNDER</button>
    </div>

    <script>
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatContainer = document.getElementById('chat-container');

        inputField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        
        sendBtn.addEventListener('click', sendMessage);

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.textContent = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const prompt = inputField.value.trim();
            if (!prompt) return;

            appendMessage(prompt, 'user-message');
            inputField.value = '';
            
            inputField.disabled = true;
            sendBtn.disabled = true;

            const loadingDiv = appendMessage('Veri işleniyor...', 'bot-message');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();
                loadingDiv.remove(); 

                if (response.ok && data.reply) {
                    appendMessage(data.reply, 'bot-message');
                } else {
                    appendMessage(`Bağlantı Reddedildi: ${data.error || "Bilinmeyen sunucu hatası."}`, 'error-message');
                }

            } catch (error) {
                loadingDiv.remove();
                appendMessage(`Ağ Hatası: Sunucuya ulaşılamıyor. Detay: ${error.message}`, 'error-message');
            } finally {
                inputField.disabled = false;
                sendBtn.disabled = false;
                inputField.focus();
            }
        }
    </script>
</body>
</html>
